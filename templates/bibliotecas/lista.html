{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gestão de Bibliotecas</h2>
    <a href="{% url 'criar_biblioteca' %}" class="btn btn-primary">Nova Biblioteca</a>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nome</th>
                    <th>Endereço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for biblioteca in bibliotecas %}
                <tr>
                    <td>{{ biblioteca.nome }}</td>
                    <td>{{ biblioteca.endereco }}</td>
                    <td>
                        <a href="{% url 'editar_biblioteca' biblioteca.pk %}" class="btn btn-sm btn-outline-warning">Editar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted">Nenhuma biblioteca cadastrada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
