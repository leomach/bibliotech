{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gestão de Usuários</h2>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Papel</th>
                    <th>Biblioteca</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for usu in usuarios_lista %}
                <tr>
                    <td>{{ usu.nome }}</td>
                    <td>{{ usu.email }}</td>
                    <td>
                        <span class="badge {% if usu.papel == 'admin' %}bg-danger{% elif usu.papel == 'bibliotecario' %}bg-primary{% else %}bg-secondary{% endif %}">
                            {{ usu.get_papel_display }}
                        </span>
                    </td>
                    <td>{{ usu.biblioteca.nome|default:"Acesso Global" }}</td>
                    <td>
                        <a href="{% url 'admin_editar_usuario' usu.pk %}" class="btn btn-sm btn-outline-warning">Vincular/Editar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
