{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm">
            <div class="card-body py-5">
                <div class="mb-4">
                    <i class="bi bi-envelope-check text-success" style="font-size: 4rem;"></i>
                </div>
                <h3>E-mail enviado!</h3>
                <p class="text-muted">Enviamos as instruções para redefinir sua senha para o e-mail informado. Se o e-mail existir em nossa base, você o receberá em breve.</p>
                <p class="small text-muted">Não esqueça de verificar sua pasta de spam.</p>
                <a href="{% url 'login' %}" class="btn btn-primary mt-3">Voltar para o Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
