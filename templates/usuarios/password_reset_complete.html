{% extends 'base.html' %}

{% block content %}

    <div class="col-md-6 text-center">
        <div class="card shadow-sm">
            <div class="card-body py-5">
                <div class="mb-4">
                    <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>

        </div>
    </div>
</div>
{% endblock %}
