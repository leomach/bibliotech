<div id="perfil-container" class="border p-3 rounded bg-light">
    <form hx-post="{% url 'perfil_editar' %}" hx-target="#perfil-container" hx-swap="outerHTML">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Nome</label>
            {{ form.nome }}
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            {{ form.email }}
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success btn-sm">Salvar</button>
            <button type="button" class="btn btn-secondary btn-sm" 
                    hx-get="{% url 'perfil' %}" 
                    hx-target="#main-content" 
                    hx-select="#perfil-container"
                    hx-swap="outerHTML">
                Cancelar
            </button>
        </div>
    </form>
</div>
