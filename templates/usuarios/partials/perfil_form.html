<div id="perfil-container" class="border p-3 rounded bg-light shadow-sm">
    <h6 class="mb-3 text-muted">Editando Informações</h6>
    <form hx-post="{% url 'perfil_editar' %}" hx-target="#perfil-container" hx-swap="outerHTML">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold">Nome Completo</label>
            {{ form.nome }}
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Endereço de E-mail</label>
            {{ form.email }}
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success btn-sm px-4">Salvar Alterações</button>
            <button type="button" class="btn btn-outline-secondary btn-sm px-4" 
                    hx-get="{% url 'perfil' %}" 
                    hx-target="#perfil-container" 
                    hx-swap="outerHTML">
                Cancelar
            </button>
        </div>
    </form>
</div>
