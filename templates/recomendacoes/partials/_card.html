<a href="{% url 'detalhe_livro' livro.pk %}" class="text-decoration-none">
    <div class="card border-0 shadow-sm h-100" style="transition: box-shadow .2s;" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.15)'" onmouseout="this.style.boxShadow=''">
        <div class="card-body">
            <div class="d-flex align-items-start gap-3">
                <div class="bg-primary bg-opacity-10 rounded p-2 flex-shrink-0">
                    <i class="bi bi-book text-primary fs-5"></i>
                </div>
                <div class="overflow-hidden w-100">
                    <h6 class="card-title mb-1 text-dark text-truncate" title="{{ livro.titulo }}">{{ livro.titulo }}</h6>
                    <p class="text-muted small mb-2 text-truncate">{{ livro.autor }}</p>
                    <div class="d-flex gap-1 flex-wrap">
                        <span class="badge bg-light text-dark border">{{ livro.categoria }}</span>
                        {% if livro.has_disponivel %}
                            <span class="badge text-bg-success">Disponível</span>
                        {% else %}
                            <span class="badge text-bg-secondary">Indisponível</span>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</a>
