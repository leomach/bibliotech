{% if livros %}
<div>
    <div class="d-flex align-items-center mb-3">
        <i class="bi bi-stars text-warning me-2 fs-5"></i>
        <h5 class="mb-0">{{ titulo }}</h5>
    </div>
    <div class="row g-3">
        {% for livro in livros %}
        <div class="col-md-4 col-sm-6">
            {% include 'recomendacoes/partials/_card.html' with livro=livro %}
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
