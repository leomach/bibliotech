{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Catálogo de Livros</h2>
    {% if user.is_bibliotecario or user.is_admin_system %}
        <a href="{% url 'cadastrar_livro' %}" class="btn btn-success">Cadastrar Livro</a>
    {% endif %}
</div>

<div class="mb-4">
    <input type="text" 
           name="q" 
           class="form-control" 
           placeholder="Buscar por título, autor ou ISBN..." 
           hx-get="{% url 'lista_livros' %}" 
           hx-trigger="keyup changed delay:500ms" 
           hx-target="#livros-grid" 
           hx-indicator=".htmx-indicator">
    <div class="htmx-indicator spinner-border spinner-border-sm text-primary mt-2" role="status">
        <span class="visually-hidden">Carregando...</span>
    </div>
</div>

<div id="livros-grid">
    {% include 'acervo/partials/livros_grid.html' %}
</div>
{% endblock %}
